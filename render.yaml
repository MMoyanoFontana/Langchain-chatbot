services:
  - type: web
    name: langchain-chatbot-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    port: 8000
    scaling:
      minInstances: 1
      maxInstances: 3
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Required environment variables — set these in Render dashboard or via CLI
      - key: API_KEY_ENCRYPTION_KEY
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: "https://your-frontend-url.vercel.app"
      - key: DATABASE_URL
        sync: false  # Set to your Neon Postgres connection string
      # Optional RAG variables
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_NAMESPACE_PREFIX
        value: "rag"
      # Optional observability
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
      # Optional OAuth
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
